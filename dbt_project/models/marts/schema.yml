version: 2
models:
  - name: fct_daily_market
    description: Daily OHLCV with anomaly counts and trend classification
    columns:
      - name: symbol
        tests: [not_null]
      - name: trade_date
        tests: [not_null]
      - name: day_open
        tests: [not_null]
      - name: day_close
        tests: [not_null]
      - name: trend_direction
        tests:
          - accepted_values:
              values: ['strong_up', 'up', 'down', 'strong_down']

  - name: fct_realtime_ohlcv
    description: 1-minute bars with moving averages and trend signals
    columns:
      - name: symbol
        tests: [not_null]
      - name: window_start
        tests: [not_null]
      - name: trend_signal
        tests:
          - accepted_values:
              values: ['bullish', 'bearish', 'neutral']

  - name: dim_symbols
    description: Symbol dimension with volume tier and anomaly history
    columns:
      - name: symbol
        tests: [not_null, unique]
